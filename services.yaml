Resources:
  vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 192.168.10.0/24
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
       - Key: Name
         Value: speaks-vpc
  ipv6CidrBlock:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref vpc
      AmazonProvidedIpv6CidrBlock: true

  pubsubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: ipv6CidrBlock
    Properties:
      VpcId: !Ref vpc
      CidrBlock: 192.168.10.0/26
      AvailabilityZone: "us-east-1a"
      MapPublicIpOnLaunch: true
      Ipv6CidrBlock: !Select [ 0, !Cidr [ !Select [ 0, !GetAtt vpc.Ipv6CidrBlocks], 256, 64 ]]
      AssignIpv6AddressOnCreation: true
      Tags:
       - Key: Name
         Value: speaks-pubsubnet-a

  pubsubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: ipv6CidrBlock
    Properties:
      VpcId: !Ref vpc
      CidrBlock: 192.168.10.64/26
      AvailabilityZone: "us-east-1b"
      MapPublicIpOnLaunch: true
      Ipv6CidrBlock: !Select [ 1, !Cidr [ !Select [ 0, !GetAtt vpc.Ipv6CidrBlocks], 256, 64 ]]
      AssignIpv6AddressOnCreation: true
      Tags:
       - Key: Name
         Value: speaks-pubsubnet-b
  
  privsubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: ipv6CidrBlock
    Properties:
      VpcId: !Ref vpc
      CidrBlock: 192.168.10.128/26
      AvailabilityZone: "us-east-1a"
      Ipv6CidrBlock: !Select [ 2, !Cidr [ !Select [ 0, !GetAtt vpc.Ipv6CidrBlocks], 256, 64 ]]
      AssignIpv6AddressOnCreation: true
      Tags:
       - Key: Name
         Value: speaks-privsubnet-a

  privsubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: ipv6CidrBlock
    Properties:
      VpcId: !Ref vpc
      CidrBlock: 192.168.10.192/26
      AvailabilityZone: "us-east-1b"
      Ipv6CidrBlock: !Select [ 3, !Cidr [ !Select [ 0, !GetAtt vpc.Ipv6CidrBlocks], 256, 64 ]]
      AssignIpv6AddressOnCreation: true
      Tags:
       - Key: Name
         Value: speaks-privsubnet-b

  igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value: speaks-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Ref: vpc
      InternetGatewayId:
        Ref: igw
  
  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  nat:
    Type: AWS::EC2::NatGateway
    Properties:
        AllocationId: !GetAtt EIP.AllocationId
        SubnetId: !Ref pubsubnet1
        Tags:
        - Key: Name
          Value: speaks-ngw

  rtspeaksigw:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref vpc
      Tags:
      - Key: Name
        Value: speaks-rtpublic

  rtspeaksnat:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref vpc
      Tags:
      - Key: Name
        Value: speaks-rtprivate

  AssociationPub1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref pubsubnet1
      RouteTableId: !Ref rtspeaksigw

  AssociationPub2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref pubsubnet2
      RouteTableId: !Ref rtspeaksigw

  AssociationPriv1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref privsubnet1
      RouteTableId: !Ref rtspeaksnat
  
  AssociationPriv2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref privsubnet2
      RouteTableId: !Ref rtspeaksnat

  routeigw:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
       RouteTableId: !Ref rtspeaksigw
       DestinationCidrBlock: 0.0.0.0/0
       GatewayId: !Ref igw
  
  routenat:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
       RouteTableId: !Ref rtspeaksnat
       DestinationCidrBlock: 0.0.0.0/0
       GatewayId: !Ref nat

  lbsg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lks-lb-sg
      GroupDescription: for alb
      VpcId: !Ref vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 81
          ToPort: 81
          CidrIp: 0.0.0.0/0
      Tags:
       - Key: Name
         Value: lks-lb-sg

  containersg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lks-container-sg
      GroupDescription: for container
      VpcId: !Ref vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          SourceSecurityGroupId: !Ref lbsg
      Tags:
       - Key: Name
         Value: lks-container-sg

  dockersg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lks-docker-sg
      GroupDescription: for docker
      VpcId: !Ref vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          CidrIp: 0.0.0.0/0
      Tags:
       - Key: Name
         Value: lks-docker-sg

  dbsg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lks-db-sg
      GroupDescription: for rds
      VpcId: !Ref vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 192.168.10.0/24
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 192.168.10.0/24
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref containersg
      Tags:
       - Key: Name
         Value: lks-db-sg

  redissg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: lks-redis-sg
      GroupDescription: for redis
      VpcId: !Ref vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 192.168.10.0/24
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          SourceSecurityGroupId: !Ref containersg
      Tags:
       - Key: Name
         Value: lks-redis-sg


  



  
  
  
  

  